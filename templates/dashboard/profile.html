{% extends 'base.html' %}

{% block content %}
  <section class="section-panel glass-card form-card">
    <p class="card-label">Profile Settings</p>
    <h2>Update your account security</h2>
    <p>Change your password and keep your healthcare access secure.</p>

    <div class="profile-summary">
      <p><strong>Username:</strong> {{ username }}</p>
      <p><strong>Total predictions:</strong> {{ total_predictions }}</p>
    </div>

    <form action="{{ url_for('profile') }}" method="post" class="form-grid">
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" name="current_password" placeholder="Current password" autocomplete="current-password" required />
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" name="new_password" placeholder="New password" autocomplete="new-password" required />
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" name="confirm_password" placeholder="Confirm new password" autocomplete="new-password" required />
      </div>
      <button type="submit" class="btn-primary">Change Password</button>
    </form>
  </section>
{% endblock %}
