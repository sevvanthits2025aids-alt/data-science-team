{% extends 'base.html' %}

{% block content %}
  <section class="section-panel glass-card">
    <div class="section-header">
      <div>
        <p class="eyebrow">Live AI Chat</p>
        <h2>Healthcare Assistant Chat</h2>
      </div>
    </div>

    <div id="chat-area" class="chat-area">
      <div class="message bot-message">
        <span class="message-role">AI</span>
        <p>Start a conversation describing your symptoms and the assistant will offer a prediction and guidance.</p>
      </div>
    </div>

    <form id="chat-form" class="chat-form">
      <input id="chat-input" type="text" name="message" placeholder="Type symptoms here..." autocomplete="off" required />
      <button type="submit" class="btn-primary">Send</button>
    </form>
  </section>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
